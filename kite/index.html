<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kite Marseille — Vent &amp; décisions</title>
  <meta name="description" content="Conditions de vent en temps réel et recommandations kite pour les spots autour de Marseille." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪁</text></svg>" />
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="topbar">
    <h1>🪁 Kite Marseille</h1>
    <div class="topbar-right">
      <span id="maj" class="maj">chargement…</span>
      <button id="refresh" class="btn-refresh" title="Actualiser">⟳</button>
    </div>
  </header>

  <main>
    <!-- ÉCRAN 1 · TABLEAU -->
    <section id="ecran-tableau" class="ecran actif">
      <div class="table-wrap">
        <table id="table-spots">
          <thead>
            <tr>
              <th>Spot</th>
              <th>Verdict</th>
              <th>Vent</th>
              <th>Rafales</th>
              <th>Direction</th>
              <th>Tendance</th>
            </tr>
          </thead>
          <tbody>
            <!-- rempli par app.js -->
          </tbody>
        </table>
      </div>
      <p class="note">Vent en nœuds · données Open-Meteo (modèle météo, pas d'anémomètre physique) · actualisation auto toutes les 5&nbsp;min.</p>
    </section>

    <!-- ÉCRAN 2 · RECO -->
    <section id="ecran-reco" class="ecran">
      <div class="reglages">
        <label>Poids rider
          <input type="number" id="poids" min="40" max="130" step="1" /> kg
        </label>
        <label>Plage de vent
          <input type="number" id="vent-min" min="5" max="25" step="1" /> –
          <input type="number" id="vent-max" min="15" max="45" step="1" /> nds
        </label>
      </div>
      <div id="cartes-reco" class="cartes-reco">
        <!-- rempli par app.js -->
      </div>
    </section>

    <!-- ÉCRAN 3 · CARTE -->
    <section id="ecran-carte" class="ecran">
      <div id="map"></div>
    </section>
  </main>

  <nav class="tabs">
    <button class="tab actif" data-ecran="ecran-tableau">📋<span>Tableau</span></button>
    <button class="tab" data-ecran="ecran-reco">🪁<span>Reco</span></button>
    <button class="tab" data-ecran="ecran-carte">🗺️<span>Carte</span></button>
  </nav>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
